<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Quotas</title>
    <link rel="stylesheet" href="css/HU-004.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-legft">
            <img src="img/weekly-calendar_icon-icons.com_56749.png">
            <h2>My Quotas</h2>
        </div>

        <!-- FLECHA FUNCIONAL -->
        <div class="header-right" onclick="goBack()">
            <img src="img/flecha.png" alt="back">
        </div>
    </div>

    <div class="content">

        <!-- FORMULARIO -->
        <div class="form">
            <input type="text" id="plate" placeholder="Plate (required)">

            <select id="zone">
                <option value="">Select Zone</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1">B1</option>
            </select>

            <select id="type">
                <option value="hour">Per Hour ($2.000)</option>
                <option value="day">Per Day ($20.000)</option>
            </select>

            <input type="number" id="quantity" placeholder="Hours or Days">

            <p>Total: $<span id="total">0</span></p>

            <button onclick="calculate()">Calculate</button>
            <button onclick="confirmReservation()">Confirm</button>
        </div>

        <!-- LISTA -->
        <div class="top-bar">
            <h3>List of reservations</h3>
            <button class="btn">View reservation</button>
        </div>

        <table>
            <thead>
                <tr>  
                    <th>Nro</th>
                    <th>Plate ▼</th>
                    <th>Location</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/HU-004.js"></script>

</body>
</html>
