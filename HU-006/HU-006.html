<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Inspection</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>


<header class="header">
    <div class="back">
        <img src="img/flecha.png" alt="back">
    </div>
    <h1><span>tech</span> parking</h1>
</header>


<div class="container">

    <div class="icon">
    <img src="img/transito.png" alt="inspector">
    </div>
    <h2>Vehicle Inspection</h2>

    <label>El agente de tráfico introducirá el número de matrícula</label>

    <div class="plate-input">
        <img src="img/colombia.png" class="flag">
        <input 
            type="text" 
            id="plate" 
            placeholder="Ej: ABC123"
            required
            >
    </div>

    <button class="btn" onclick="checkPlate()">Check</button>

    <div id="result">
        <br>

    
        <div class="card success">
            <div class="icon-status">
            <img src="img/aceptar.png" alt="valid">
            </div>
            <div class="info">
                <h3>PAYMENT PROCESSED</h3>
                <p>Zone A1</p>
                <p>14 : 30 - 16 : 30 (2h)</p>
                <p>Time remaining: 45 min</p>
            </div>
            <span class="badge valid">Valid</span>
        </div>

        <br>

        <div class="card error">
            <div class="icon-status">
                <img src="img/boton-x.png" alt="error">
            </div>
            <div class="info">
                <h3>PAYMENT INACTIVE</h3>
                <p>Zone B2</p>
                <p>10 : 00 - 12 : 00 (1h)</p>
                <p>Expired 1 hour and 40 minutes ago</p>
            </div>
            <span class="badge expired">Expired</span>
        </div>
        <br>
        <br>
            <h3>NOT REGISTERED</h3>
  
        <div class="card neutral">
            <div class="icon-status">
                <img src="img/eliminar.png" alt="not found">
            </div>
            <div class="info">
                
                <p>The license plate has no active payments</p>
            </div>
        </div>

    </div>

</div>


<script src="js/script.js"></script>

</body>
</html>
