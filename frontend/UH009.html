<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Parking - Recuperar Contraseña</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="barra-azul">
        <div class="contenedor-logo">
            <img src="techparking.png" alt="Tech Parking" class="imagen-logo">
        </div>
    </header>
    <main class="contenedor-flexible">
        <section class="tarjeta-blanca">
            
            <h1 class="titulo">Forgot your password?</h1>

            <p class="instrucciones">
                Enter the email address associated with your profile so we can send you the account recovery link.
            </p>
            
            <input type="email" class="entrada-email" placeholder="ENTER YOUR EMAIL">

            <div class="contenedor-volver">
                <a href="#" class="enlace-volver">
                    <span class="icono-flecha">&larr;</span>
                    go back
                </a>
            </div>

        </section>
    </main>

</body>
</html>
