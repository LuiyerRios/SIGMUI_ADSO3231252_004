<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home-Available Areas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><!-- ICONOS -->
</head>
<body>
    <div class="dashboard"><!--Contenedor de dashboard-->
        <!--Header-->
        <header class="top-header">
            <button id="menu-toggle"><!--Botón para mostrar el menú lateral-->
                <i class="fas fa-bars"></i><!-- "i class=fas fa-bars" se refiere a un ícono de barras -->
            </button>

            <div class="header-icon">
                <i class="fas fa-evenlope"></i><!-- "i class=fas fa-envelope" se refiere a un ícono de sobre -->
                <i class="fas fa-user-circle"></i><!-- "i class=fas fa-user-circle" se refiere a un ícono de círculo de usuario -->
            </div>
        </header>
        <!--Sidebar-->
        <aside class="sidebar" id="sidebar"><!--Contenedor del menú lateral, la etiqueta aside se utiliza para definir un área lateral -->
            <ul><!--Lista de elementos del menú lateral-->
                <li>Available Reservations</li>
                <li>My Quotas</li>
                <li>Request more time</li>
                <li>Payments</li>
                <li>Settings</li>
                <li>Help</li>
            </ul>
            <button class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>Logout<!-- "i class=fas fa-sign-out-alt" se refiere a un ícono de salida -->
            </button>

        </aside>

        <!--Main Content-->
        <main class="main-content"><!--Contenedor del contenido principal-->
            <div class="map-container">><!--Contenedor del mapa de estacionamiento-->
                <img src="img/map-background.png" alt="Parking Map"><!--Imagen del mapa de estacionamiento, el atributo src se utiliza para especificar la ruta de la imagen y el atributo alt se utiliza para proporcionar una descripción alternativa de la imagen-->
                <button class="confirm-btn"><!--Botón para confirmar el pago-->
                    Confirm payment
                </button>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
