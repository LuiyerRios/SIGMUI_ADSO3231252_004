<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/help.css">
    <title>Centro de Ayuda</title>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <h1>Are you having <span>any problems?</span></h1>
            <p>Send us a message describing the issue you're experiencing, and our agents will resolve it quickly. You can also send us any suggestions.</p>
        </header>
        <main class="form-container">
            <form id="help-form">
                <div class="input-group">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" id="firstname" placeholder="enter your first Name" required>
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="enter your email" required>
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" id="lastname" placeholder="enter your last Name" required>
                    </div>
                    <div class="field">
                        <label>Phone</label>
                        <input type="tel" id="phone" placeholder="enter your phone number" required>
                    </div>
                </div>
                <div class="field full-width">
                    <label>Description</label>
                    <textarea id="description" maxlength="300" placeholder="Please enter a message describing the situation, problem, or suggestion you have" required></textarea>
                    <span class="char-counter"><span id="current">0</span> / 300 characters</span>
                </div>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </main>
        <footer class="help-footer">
            <a href="index.html" class="go-back">
                <i class="fas fa-sign-out-alt"></i>Go back
            </a>
        </footer>
    </div>
    <script src="js/help.js"></script>
</body>
</html>
