<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative-Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">

    <div class="header">
        <div class="filtro">
            📅 Filter by date
            <input type="date">
        </div>

        <div class="acciones">
            <button class="btn">Exportar PDF</button>
            <button class="btn">Exportar Excel</button>
        </div>
    </div>

    <div class="contenido">
        <div class="grafica">
            <img src="img/Grafica.png" alt="Gráfica">
        </div>

        <div class="mensaje-error">
            ⚠️ Sin datos disponibles
        </div>
    </div>
</div>
</body>
</html>
